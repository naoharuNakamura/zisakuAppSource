server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  datasource:
    url: jdbc:sqlite:${SQLITE_DB_PATH:C:/src/zisaku_app/zisaku-backend/database.db}
    driver-class-name: org.sqlite.JDBC

jwt:
  secret: ${JWT_SECRET:your-very-long-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-make-it-strong-and-unique-for-production}

mybatis:
  map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.zisakuapp.zisaku_backend.model

logging:
  level:
    com:
      zisakuapp:
        zisaku_backend:
          mapper: DEBUG